# Render.com deployment configuration for Musawo AI
# One-click deploy: https://render.com/deploy

services:
  - type: web
    name: musawo-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_BACKEND
        value: claude
      - key: QDRANT_URL
        value: http://musawo-qdrant:6333
      - key: APP_ENV
        value: production
    healthCheckPath: /health
    plan: free

  - type: web
    name: musawo-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: INTERNAL_API_URL
        fromService:
          name: musawo-api
          type: web
          property: hostport
    plan: free
